name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libcpputest-dev ninja-build clang

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_INSTALL_PREFIX=/usr/local

      - name: Build
        run: cmake --build build --parallel

      - name: Build static library explicitly
        run: cmake --build build --target argparse-c-static

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Verify installed package consumers
        run: |
          install_prefix="$PWD/stage/release"
          cmake --install build --prefix "$install_prefix"

          cmake -S sample/consumer/cmake -B consumer-build/cmake \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_PREFIX_PATH="$install_prefix"
          cmake --build consumer-build/cmake --parallel
          ./consumer-build/cmake/argparse_c_consumer

          export PKG_CONFIG_PATH="$install_prefix/lib/pkgconfig"
          export LD_LIBRARY_PATH="$install_prefix/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          clang sample/consumer/pkg-config/main.c \
            -o consumer-build/pkg-config-consumer \
            $(pkg-config --cflags --libs argparse-c)
          ./consumer-build/pkg-config-consumer

      - name: Prepare release assets
        run: |
          mkdir -p dist/install-root
          DESTDIR="$PWD/dist/install-root" cmake --install build --prefix /usr/local
          tar -czf dist/argparse-c-${{ github.ref_name }}-source.tar.gz \
            --exclude-vcs \
            --exclude='./build' \
            --exclude='./build-clang' \
            --exclude='./dist' \
            .
          tar -czf dist/argparse-c-${{ github.ref_name }}-linux-install-tree.tar.gz \
            -C dist/install-root/usr/local \
            include \
            lib
          cp dist/install-root/usr/local/lib/libargparse-c.a \
            dist/argparse-c-${{ github.ref_name }}-linux-static.a
          sha256sum \
            dist/argparse-c-${{ github.ref_name }}-source.tar.gz \
            dist/argparse-c-${{ github.ref_name }}-linux-install-tree.tar.gz \
            dist/argparse-c-${{ github.ref_name }}-linux-static.a \
            > dist/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/argparse-c-${{ github.ref_name }}-source.tar.gz
            dist/argparse-c-${{ github.ref_name }}-linux-install-tree.tar.gz
            dist/argparse-c-${{ github.ref_name }}-linux-static.a
            dist/SHA256SUMS.txt
