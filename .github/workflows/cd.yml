name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libcpputest-dev ninja-build clang

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_INSTALL_PREFIX=/usr/local

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Prepare release assets
        run: |
          mkdir -p dist/install-root
          DESTDIR="$PWD/dist/install-root" cmake --install build --prefix /usr/local
          tar -czf dist/argparse-c-${{ github.ref_name }}-source.tar.gz \
            --exclude-vcs \
            --exclude='./build' \
            --exclude='./build-clang' \
            --exclude='./dist' \
            .
          tar -czf dist/argparse-c-${{ github.ref_name }}-linux-install-tree.tar.gz \
            -C dist/install-root/usr/local \
            include \
            lib
          sha256sum \
            dist/argparse-c-${{ github.ref_name }}-source.tar.gz \
            dist/argparse-c-${{ github.ref_name }}-linux-install-tree.tar.gz \
            > dist/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/argparse-c-${{ github.ref_name }}-source.tar.gz
            dist/argparse-c-${{ github.ref_name }}-linux-install-tree.tar.gz
            dist/SHA256SUMS.txt
