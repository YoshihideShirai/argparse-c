name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  warning-gate:
    name: Warning gate (${{ matrix.compiler.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - cc: gcc
            cxx: g++
          - cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure (-Werror)
        run: |
          set -euo pipefail
          cmake -S . -B build-warning-gate \
            -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_C_FLAGS='-Werror' \
            -DCMAKE_CXX_FLAGS='-Werror' 2>&1 | tee build-warning-gate-configure.log

      - name: Build required targets with raw compiler logs
        run: |
          set -euo pipefail
          : > build-warning-gate-build.log
          for target in argparse-c sample argparse_test; do
            echo "==== Building target: ${target} ====" | tee -a build-warning-gate-build.log
            cmake --build build-warning-gate --target "${target}" --parallel 2>&1 | tee -a build-warning-gate-build.log
          done

      - name: Upload warning-gate logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: warning-gate-logs-${{ matrix.compiler.cc }}
          path: |
            build-warning-gate-configure.log
            build-warning-gate-build.log

  build-and-test:
    name: Build & Test (${{ matrix.compiler.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - cc: gcc
            cxx: g++
          - cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config zsh man-db

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }}

      - name: Build
        run: cmake --build build --parallel

      - name: Build static library explicitly
        run: cmake --build build --target argparse-c-static

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Verify installed package consumers
        run: |
          install_prefix="$PWD/stage/${{ matrix.compiler.cc }}"
          ./test/consumer/verify-installed-consumers.sh \
            build \
            "$install_prefix" \
            ${{ matrix.compiler.cc }}

  shell-syntax:
    name: Shell completion syntax checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++ bash fish zsh

      - name: Configure
        run: |
          cmake -S . -B build-shell \
            -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++

      - name: Build sample generators
        run: |
          cmake --build build-shell --parallel --target example_completion

      - name: Validate generated shell scripts
        run: |
          set -euo pipefail

          generator="./build-shell/sample/example_completion"
          out_dir="build-shell/generated/example_completion"
          mkdir -p "$out_dir"

          bash_out="$out_dir/example_completion.bash"
          fish_out="$out_dir/example_completion.fish"
          zsh_out="$out_dir/_example_completion"

          "$generator" --generate-bash-completion > "$bash_out"
          "$generator" --generate-fish-completion > "$fish_out"
          "$generator" --generate-zsh-completion > "$zsh_out"

          check_syntax() {
            local name="$1"
            local file="$2"
            shift 2
            echo "[syntax-check:$name] file=$file"
            echo "[syntax-check:$name] command=$*"
            if ! "$@" "$file"; then
              echo "[syntax-check:$name] failed"
              echo "[syntax-check:$name] inspect: sed -n '1,120p' '$file'"
              exit 1
            fi
          }

          check_syntax bash "$bash_out" bash -n
          check_syntax zsh "$zsh_out" zsh -n
          check_syntax fish "$fish_out" fish --no-execute

  sanitizers:
    name: Sanitizers (clang ASan/UBSan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang man-db

      - name: Configure
        run: |
          cmake -S . -B build-sanitizers \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DAP_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-sanitizers --parallel

      - name: Test
        run: ctest --test-dir build-sanitizers --output-on-failure

  clang-tools:
    name: Clang format / tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++ clang-format clang-tidy

      - name: Configure
        run: |
          cmake -S . -B build-clang-tools \
            -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++

      - name: Verify clang-format
        run: cmake --build build-clang-tools --target format-check

      - name: Run clang-tidy
        run: cmake --build build-clang-tools --target tidy

  docs-repository-sync:
    name: Docs repository sync check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify docs/repository is synchronized
        run: |
          echo "Reproduction commands:"
          echo "  python scripts/sync_docs_repository.py"
          echo "  git diff --exit-code -- docs/repository"
          python scripts/sync_docs_repository.py --print-repro-cmds
          git diff --exit-code -- docs/repository


  api-spec-sync-check:
    name: API spec sync check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify header and machine-readable API spec are synchronized
        run: |
          python scripts/sync_api_spec.py --check


  coverage:
    name: Coverage (gcovr)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++ man-db
          python -m pip install --upgrade pip
          pip install gcovr

      - name: Configure
        run: |
          cmake -S . -B build-coverage \
            -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DAP_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build-coverage --parallel

      - name: Test and report coverage
        run: |
          ctest --test-dir build-coverage --output-on-failure
          python -m gcovr \
            --root "$GITHUB_WORKSPACE" \
            --filter "$GITHUB_WORKSPACE/lib" \
            --object-directory "$GITHUB_WORKSPACE/build-coverage" \
            --exclude '.*/test/.*' \
            --exclude '.*/sample/.*' \
            --txt
