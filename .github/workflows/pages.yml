name: Deploy docs and coverage to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++
          python -m pip install --upgrade pip
          pip install mkdocs-material gcovr

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build documentation site
        run: mkdocs build

      - name: Configure coverage build
        run: |
          cmake -S . -B build-coverage \
            -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DAP_ENABLE_COVERAGE=ON

      - name: Build coverage targets
        run: cmake --build build-coverage --parallel

      - name: Generate coverage report
        run: |
          mkdir -p site/coverage
          ctest --test-dir build-coverage --output-on-failure
          python -m gcovr \
            --root "$GITHUB_WORKSPACE" \
            --filter "$GITHUB_WORKSPACE" \
            --object-directory "$GITHUB_WORKSPACE/build-coverage" \
            --exclude '.*/test/.*' \
            --exclude '.*/sample/.*' \
            --txt site/coverage.txt \
            --html-details site/coverage/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
